[package]
name = "videoson"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
default = ["h264", "rav1d", "ivf"]
h264 = ["dep:videoson-codec-h264"]
h265 = ["dep:videoson-codec-h265"]
rav1d = ["dep:videoson-codec-rav1d"]
ivf = ["dep:videoson-format-ivf"]

[dependencies]
videoson-core = { path = "../videoson-core" }
videoson-common = { path = "../videoson-common" }
videoson-format-ivf = { path = "../videoson-format-ivf", optional = true }
videoson-codec-h264 = { path = "../videoson-codec-h264", optional = true }
videoson-codec-h265 = { path = "../videoson-codec-h265", optional = true }
videoson-codec-rav1d = { path = "../videoson-codec-rav1d", optional = true }
