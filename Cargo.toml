[workspace]
resolver = "3"
members = [
  "videoson",
  "videoson-core",
  "videoson-common",
  "videoson-codec-h264",
  "videoson-codec-av1",
  "videoson-codec-rav1d",
  "videoson-format-ivf",
  "testbench",
]

[workspace.package]
version = "0.1.2"
edition = "2024"
license = "LGPL-2.1"
rust-version = "1.93"

[workspace.dependencies]
videoson-core = { path = "videoson-core", version = "0.0.0" }
videoson-common = { path = "videoson-common", version = "0.0.0" }
rust_h264 = { version = "0.4.0" }
